spring:
  application:
    name: strategy-hub
  datasource:
    url: jdbc:postgresql://localhost:5432/strategy_hub
    username: ${POSTGRES_USER:daz}
    password: ${POSTGRES_PASSWORD:jdbc}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 10
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 25
    open-in-view: false
